        body { margin: 0; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        .controls {
            position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 10;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        .control-btn {
            background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.5);
            padding: 20px; font-size: 24px; cursor: pointer; border-radius: 50%;
            width: 60px; height: 60px; display: inline-flex; align-items: center; justify-content: center;
            touch-action: none; user-select: none;
        }
        .control-btn:active { background: rgba(255,255,255,0.6); }
        #color-btn { background: #ff0000; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; z-index: 20; text-align: center;
        }
        #progress-bar { width: 200px; height: 20px; background: #333; border: 1px solid #fff; margin-top: 10px; }
        #progress-fill { height: 100%; background: #4caf50; width: 0%; transition: width 0.3s; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
            background: red; border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none;
        }
    </style>
</head>

        const textureLoader = new THREE.TextureLoader();
        const baseUrl = "https://ordinals.com/content/";
        const fallbackUrl = "https://via.placeholder.com/300";
        const inscriptionsMeshes = [];
        let loadedTextures = 0, failedTextures = 0;
        const totalTextures = Object.values(inscriptions).reduce((sum, room) => sum + Object.values(room).reduce((s, arr) => s + arr.length, 0), 0) || 1;

        const addFrame = (url, x, y, z, rotation) => {
            textureLoader.load(baseUrl + url, texture => {
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide }));
                mesh.position.set(x, y, z); mesh.rotation.y = rotation;
                scene.add(mesh); inscriptionsMeshes.push(mesh);
                loadedTextures++; updateLoadingProgress();
            }, undefined, () => handleTextureError(url, x, y, z, rotation));
        };

        function handleTextureError(url, x, y, z, rotation) {
            failedTextures++;
            textureLoader.load(fallbackUrl, texture => {
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide }));
                mesh.position.set(x,y,z); mesh.rotation.y = rotation;
                scene.add(mesh); inscriptionsMeshes.push(mesh);
                loadedTextures++; updateLoadingProgress();
            });
        }

        function updateLoadingProgress() {
            const progress = (loadedTextures / totalTextures) * 100;
            document.getElementById("progress-fill").style.width = `${progress}%`;
            if (failedTextures > 0) document.getElementById("loading-error").style.display = "block";
            if (loadedTextures >= totalTextures) setTimeout(() => document.getElementById("loading").remove(), 500);
        }

        // Caméra
        camera.position.set(0, 2, 0);
        let yaw = Math.PI;
        let pitch = 0;
        const sensitivity = 0.0025;

        function updateCamera() {
            camera.rotation.order = 'YXZ';
            camera.rotation.set(pitch, yaw, 0);
        }

        renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * sensitivity;
                pitch -= e.movementY * sensitivity;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                updateCamera();
            }
        });

        // === Rockets + Auto-fire ===
        const rocketColors = [{hex:0xff0000},{hex:0x0000ff},{hex:0x00ff00},{hex:0xffff00},{hex:0xffffff},{hex:0x000000},{hex:0xffa500}];
        let currentColorIndex = 0;
        let rocketMaterial = new THREE.MeshBasicMaterial({ color: rocketColors[0].hex });
        let traceMaterial = new THREE.MeshBasicMaterial({ color: rocketColors[0].hex });

        function updateColors() {
            currentColorIndex = (currentColorIndex + 1) % rocketColors.length;
            const col = rocketColors[currentColorIndex].hex;
            rocketMaterial = new THREE.MeshBasicMaterial({ color: col });
            traceMaterial = new THREE.MeshBasicMaterial({ color: col });
            document.getElementById("color-btn").style.background = '#' + col.toString(16).padStart(6,'0');
        }

        const rocketGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 16);
        const rockets = [];
        const rocketSpeed = 0.25;
        const raycaster = new THREE.Raycaster();
        let lastShotTime = 0;
        const fireRate = 20;
        let isFiring = false;

        function getDirection() {
            return new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        }

        function launchRocket() {
            const now = Date.now();
            if (now - lastShotTime < fireRate) return;
            lastShotTime = now;

            const rocket = new THREE.Mesh(rocketGeometry, rocketMaterial);
            rocket.position.copy(camera.position);
            const dir = getDirection();
            rocket.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
            scene.add(rocket);
            rockets.push({ mesh: rocket, direction: dir, distance: 0 });
        }

        function createTrace(point, normal) {
            const trace = new THREE.Mesh(new THREE.CircleGeometry(0.12, 16), traceMaterial);
            trace.position.copy(point).add(normal.clone().multiplyScalar(0.02));
            trace.lookAt(point.clone().add(normal));
            scene.add(trace);
        }

        // Clic gauche = Tir (maintenir = continu)
        renderer.domElement.addEventListener('mousedown', e => {
            if (e.button === 0) {
                isFiring = true;
            }
            else if (e.button === 2) {
                updateColors();
            }
        });
        document.addEventListener('mouseup', e => {
            if (e.button === 0) isFiring = false;
        });


        // Mouvement + Auto-fire dans la boucle
        let moveForward = 0, moveBackward = 0, moveLeft = 0, moveRight = 0;
        let isJumping = false, velocityY = 0;
        const moveSpeed = 0.08;
        const jumpSpeed = 0.22;
        const gravity = 0.012;

        const keys = {};
        document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        // Boutons tactiles
        document.getElementById("mf").addEventListener("touchstart", () => moveForward = 1);
        document.getElementById("mb").addEventListener("touchstart", () => moveBackward = 1);
        document.getElementById("ml").addEventListener("touchstart", () => moveLeft = 1);
        document.getElementById("mr").addEventListener("touchstart", () => moveRight = 1);
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;

            // Saut avec Espace
            if (e.key === " " && !isJumping) {
                e.preventDefault();        // ← important pour éviter le scroll de page
                isJumping = true;
                velocityY = jumpSpeed;
            }
        });

        document.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });
        document.getElementById("rocket").addEventListener("touchstart", launchRocket);

        function constrainCamera() {
            camera.position.x = Math.max(-11, Math.min(18, camera.position.x));
            camera.position.z = Math.max(-5.7, Math.min(5.7, camera.position.z));
            if (camera.position.y < 2) { camera.position.y = 2; velocityY = 0; isJumping = false; }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Auto-fire
            if (isFiring) launchRocket();

            // Rockets update
            for (let i = rockets.length-1; i >= 0; i--) {
                const r = rockets[i];
                r.mesh.position.addScaledVector(r.direction, rocketSpeed);
                r.distance += rocketSpeed;

                raycaster.set(r.mesh.position, r.direction);
                const hits = raycaster.intersectObjects([...walls, ...inscriptionsMeshes]);
                if (hits.length > 0 && hits[0].distance < rocketSpeed + 0.2) {
                    createTrace(hits[0].point, hits[0].face.normal.clone().transformDirection(hits[0].object.matrixWorld));
                    scene.remove(r.mesh);
                    rockets.splice(i, 1);
                } else if (r.distance > 40) {
                    scene.remove(r.mesh);
                    rockets.splice(i, 1);
                }
            }

            // Mouvement
            const forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
            const right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);

            if (moveForward || keys['z'] || keys['arrowup']) camera.position.addScaledVector(forward, moveSpeed);
            if (moveBackward || keys['s'] || keys['arrowdown']) camera.position.addScaledVector(forward, -moveSpeed);
            if (moveLeft || keys['q'] || keys['arrowleft']) camera.position.addScaledVector(right, -moveSpeed);
            if (moveRight || keys['d'] || keys['arrowright']) camera.position.addScaledVector(right, moveSpeed);

            if (isJumping) {
                camera.position.y += velocityY;
                velocityY -= gravity;
            }
            if (camera.position.y <= 2.01) {
                camera.position.y = 2;
                velocityY = 0;
                isJumping = false;
            }

            constrainCamera();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
